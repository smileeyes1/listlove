<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية إلى مجد</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;600&family=Tajawal:wght@400;700&display=swap">

    <style>
        body {
            margin: ٠;
            padding: ٠;
            min-height: ١٠٠vh;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e9, #ffd1dc);
            font-family: "Tajawal", sans-serif;
            color: #٤٤٤;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            padding: ٣٠px ١٥px;
            margin: ٢٠px ١٠px;
            border-radius: ٢٥px;
            box-shadow: ٠ ١٠px ٣٠px rgba(255, 105, 180, 0.2);
            border: ٢px solid #ffb6c1;
        }

        .name-container {
            margin: ٢٠px ٠;
            position: relative;
            display: inline-block;
        }

        .majd-name {
            color: #c2185b;
            font-size: ٤٥px;
            font-family: "Reem Kufi", sans-serif;
            cursor: pointer;
            transition: all ٠٫٤s;
            text-shadow: ٠ ٠ ١٠px rgba(194, 24, 91, 0.3);
            padding: ١٠px ٢٠px;
            border-radius: ٢٠px;
        }

        .majd-name:active {
            transform: scale(1.1);
            text-shadow: ٠ ٠ ٢٠px rgba(194, 24, 91, 0.8);
        }

        .sparkle {
            position: absolute;
            font-size: ٣٠px;
            color: gold;
            opacity: ٠;
            pointer-events: none;
            animation: sparkleAnim ١٫٢s forwards;
        }

        @keyframes sparkleAnim {
            ٠٪ { opacity: ١; transform: translate(٠, ٠) scale(0.5); }
            ٥٠٪ { opacity: ١; transform: translate(٢٠px, -٣٠px) scale(1.2); }
            ١٠٠٪ { opacity: ٠; transform: translate(٤٠px, -٦٠px) scale(1.5); }
        }

        p {
            font-size: ٢٠px;
            line-height: ١٫٨;
            margin: ١٥px ٠;
            color: #٥٥٥;
        }

        .pdf-container {
            margin: ٢٥px ٠;
            border: ٣px solid #ec407a;
            border-radius: ١٨px;
            overflow: hidden;
            height: ٥٥vh;
            min-height: ٣٨٠px;
            box-shadow: ٠ ٨px ٢٠px rgba(236, 64, 122, 0.2);
            background: white;
        }

        .pdf-container iframe {
            width: ١٠٠%;
            height: ١٠٠%;
            border: none;
        }

        .heart-btn {
            background: linear-gradient(١٣٥deg, #ff758c, #ff7eb3);
            color: white;
            border: none;
            border-radius: ٥٠px;
            padding: ١٥px ٣٥px;
            font-size: ٢٠px;
            font-weight: bold;
            cursor: pointer;
            margin: ١٥px;
            box-shadow: ٠ ٨px ٢٠px rgba(255, 105, 180, 0.4);
            transition: all ٠٫٣s;
        }

        .heart-btn:hover {
            transform: scale(1.08);
            box-shadow: ٠ ١٢px ٣٠px rgba(255, 105, 180, 0.6);
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        .quote-container {
            margin: ٢٥px ١٥px;
            padding: ٢٠px;
            background: rgba(255, 182, 193, 0.15);
            border-radius: ١٥px;
            min-height: ٩٠px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: ١٨px;
            color: #c2185b;
            line-height: ١٫٦;
            border: ١px dashed #ffb6c1;
        }

        .note {
            font-size: ١٧px;
            color: #٧٧٧;
            margin: ٢٠px ١٥px;
        }

        @media (max-width: ٦٠٠px) {
            .majd-name { font-size: ٤٠px; }
            p { font-size: ١٨px; }
            .pdf-container { height: ٦٠vh; min-height: ٣٥٠px; }
            .quote-container { font-size: ١٦px; }
            .heart-btn { padding: ١٣px ٣٠px; font-size: ١٩px; }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="name-container">
            <h2 class="majd-name" id="majd" onclick="sparkleName()">
                مجد
            </h2>
        </div>

        <p>
            إلى زوجتي الغالية  
            أهديك كتاب لغات الحب الخمس  
            لأن فيه كثير من ما بيننا من مودة ورحمة  
            تفضلي اقرئيه هنا واستمتعي بكل صفحة
        </p>

        <div class="pdf-container">
            <iframe src="lovebook.pdf"></iframe>
        </div>

        <button class="heart-btn" onclick="showQuote()">
            كلمة من قلبي لك
        </button>

        <div class="quote-container" id="quote">
            اضغطي الزر لتري كلمة تهمس لك
        </div>

        <a href="lovebook.pdf" download class="heart-btn">
            تحميل الكتاب 💝
        </a>

        <div class="note">
            اضغطي على اسمي لتري بريقه  
            واضغطي الازرار للمزيد من الدفء والكلمات الجميلة
        </div>
    </div>

    <script>
        const quotes = [
            "الحب ليس أن تنظر بعضكما إلى بعض بل أن تنظرا معا في اتجاه واحد",
            "أنت في قلبي كالروح في الجسد لا تستقر إلا بك",
            "الزواج نصف الدين فاجعله نصف الجنة بحسن المعاشرة",
            "من رزقه الله زوجة صالحة فقد أعانه على نصف دينه",
            "أجمل ما في الحب أن يصبح الاثنان واحدا دون أن يفقد أحدهما نفسه",
            "إذا أردت أن تعرف مقدار حبي لك فانظر إلى سعادتي حين أراك",
            "الحب الحقيقي ينمو مع الزمن ويزداد جمالا بالصبر",
            "أنت بيتي وأماني وسكينتي",
            "ربنا هب لنا من أزواجنا وذرياتنا قرة أعين",
            "كل يوم معك صفحة جديدة من قصة حب لا تنتهي"
        ];

        function showQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").innerText = quotes[randomIndex];
        }

        function sparkleName() {
            const name = document.getElementById("majd");
            name.style.color = '#' + Math.floor(Math.random()*16777215).toString(16);
            name.style.transform = "scale(1.1)";

            setTimeout(() => {
                name.style.transform = "scale(1)";
            }, ٣٠٠);

            for (let i = ٠; i < ٦; i++) {
                const sparkle = document.createElement("div");
                sparkle.className = "sparkle";
                sparkle.innerText = "✨";
                sparkle.style.left = Math.random() * ١٠٠ + "٪";
                sparkle.style.top = Math.random() * ١٠٠ + "٪";
                name.parentElement.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), ١٢٠٠);
            }
        }
    </script>

</body>
</html>
