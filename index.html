<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية إلى مجد</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;600&family=Tajawal:wght@400;700&display=swap">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e9, #ffd1dc);
            font-family: "Tajawal", sans-serif;
            color: #444;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            padding: 30px 15px;
            margin: 20px 10px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            border: 2px solid #ffb6c1;
        }

        .name-container {
            margin: 20px 0;
            position: relative;
            display: inline-block;
        }

        .majd-name {
            color: #c2185b;
            font-size: 45px;
            font-family: "Reem Kufi", sans-serif;
            cursor: pointer;
            transition: all 0.4s;
            text-shadow: 0 0 10px rgba(194, 24, 91, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .majd-name:active {
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(194, 24, 91, 0.8);
        }

        .sparkle {
            position: absolute;
            font-size: 30px;
            color: gold;
            opacity: 0;
            pointer-events: none;
            animation: sparkleAnim 1.2s forwards;
        }

        @keyframes sparkleAnim {
            0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
            50% { opacity: 1; transform: translate(20px, -30px) scale(1.2); }
            100% { opacity: 0; transform: translate(40px, -60px) scale(1.5); }
        }

        p {
            font-size: 20px;
            line-height: 1.8;
            margin: 15px 0;
            color: #555;
        }

        .pdf-container {
            margin: 25px 0;
            border: 3px solid #ec407a;
            border-radius: 18px;
            overflow: hidden;
            height: 55vh;
            min-height: 380px;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.2);
            background: white;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn {
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.4);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(236, 64, 122, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .quote-container {
            margin: 25px 15px;
            padding: 20px;
            background: rgba(255, 182, 193, 0.15);
            border-radius: 15px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #c2185b;
            line-height: 1.6;
            border: 1px dashed #ffb6c1;
        }

        .note {
            font-size: 17px;
            color: #777;
            margin: 20px 15px;
        }

        @media (max-width: 600px) {
            .majd-name { font-size: 40px; }
            p { font-size: 18px; }
            .pdf-container { height: 60vh; min-height: 350px; }
            .quote-container { font-size: 16px; }
            .btn { padding: 13px 30px; font-size: 19px; }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="name-container">
            <h2 class="majd-name" id="majd" onclick="sparkleName()">
                مجد
            </h2>
        </div>

        <p>
            إلى زوجتي الغالية  
            أهديك كتاب لغات الحب الخمس  
            لأن فيه كثير من ما بيننا من مودة ورحمة  
            تفضلي اقرئيه هنا واستمتعي بكل صفحة
        </p>

        <div class="pdf-container">
            <iframe src="lovebook.pdf"></iframe>
        </div>

        <button class="btn" onclick="showQuote()">
            كلمة من قلبي لك
        </button>

        <div class="quote-container" id="quote">
            اضغطي الزر لتري كلمة تهمس لك
        </div>

        <a href="lovebook.pdf" download class="btn">
            تحميل الكتاب 💝
        </a>

        <div class="note">
            اضغطي على اسمي لتري بريقه  
            واضغطي الازرار للمزيد من الدفء والكلمات الجميلة
        </div>
    </div>

    <script>
        const quotes = [
            "الحب ليس أن تنظر بعضكما إلى بعض بل أن تنظرا معا في اتجاه واحد",
            "أنت في قلبي كالروح في الجسد لا تستقر إلا بك",
            "الزواج نصف الدين فاجعله نصف الجنة بحسن المعاشرة",
            "من رزقه الله زوجة صالحة فقد أعانه على نصف دينه",
            "أجمل ما في الحب أن يصبح الاثنان واحدا دون أن يفقد أحدهما نفسه",
            "إذا أردت أن تعرف مقدار حبي لك فانظر إلى سعادتي حين أراك",
            "الحب الحقيقي ينمو مع الزمن ويزداد جمالا بالصبر",
            "أنت بيتي وأماني وسكينتي",
            "ربنا هب لنا من أزواجنا وذرياتنا قرة أعين",
            "كل يوم معك صفحة جديدة من قصة حب لا تنتهي"
        ];

        function showQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").innerText = quotes[randomIndex];
        }

        function sparkleName() {
            const name = document.getElementById("majd");
            name.style.color = '#' + Math.floor(Math.random()*16777215).toString(16);
            name.style.transform = "scale(1.1)";

            setTimeout(() => {
                name.style.transform = "scale(1)";
            }, 300);

            for (let i = 0; i < 6; i++) {
                const sparkle = document.createElement("div");
                sparkle.className = "sparkle";
                sparkle.innerText = "✨";
                sparkle.style.left = Math.random() * 100 + "%";
                sparkle.style.top = Math.random() * 100 + "%";
                name.parentElement.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1200);
            }
        }
    </script>

</body>
</html>
