<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية إلى مجد</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;600&family=Tajawal:wght@400;700&display=swap">

    <style>
        body {
            margin: ٠;
            padding: ٠;
            min-height: ١٠٠vh;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e9, #ffd1dc);
            font-family: "Tajawal", sans-serif;
            color: #٤٤٤;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            padding: ٣٠px ١٥px;
            margin: ٢٠px ١٠px;
            border-radius: ٢٥px;
            box-shadow: ٠ ١٠px ٣٠px rgba(255, 105, 180, 0.2);
            border: ٢px solid #ffb6c1;
        }

        h1 {
            color: #c2185b;
            font-size: ٣٢px;
            margin: ١٠px ٠ ٢٠px;
            font-family: "Reem Kufi", sans-serif;
        }

        .heart {
            font-size: ٤٠px;
            margin: ٠ ٨px;
        }

        p {
            font-size: ٢٠px;
            line-height: ١٫٨;
            margin: ١٥px ٠;
            color: #٥٥٥;
        }

        .pdf-container {
            margin: ٢٥px ٠;
            border: ٣px solid #ec407a;
            border-radius: ١٨px;
            overflow: hidden;
            height: ٥٥vh;
            min-height: ٣٨٠px;
            box-shadow: ٠ ٨px ٢٠px rgba(236, 64, 122, 0.2);
            background: white;
        }

        .pdf-container iframe {
            width: ١٠٠%;
            height: ١٠٠%;
            border: none;
        }

        .heart-btn {
            position: relative;
            width: ١٤٠px;
            height: ١٤٠px;
            background: linear-gradient(١٣٥deg, #ff758c, #ff7eb3);
            color: white;
            border: none;
            border-radius: ٥٠٪ ٥٠٪ ٥٠٪ ٥٠٪ / ٦٠٪ ٦٠٪ ٤٠٪ ٤٠٪;
            font-size: ٢٠px;
            font-weight: bold;
            cursor: pointer;
            margin: ٢٠px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: ١٠px;
            box-shadow: ٠ ١٠px ٢٥px rgba(255, 105, 180, 0.4);
            transition: all ٠٫٣s;
            overflow: hidden;
        }

        .heart-btn::before {
            content: "❤️";
            position: absolute;
            font-size: ٦٠px;
            opacity: ٠٫٢;
            top: ٥٠٪;
            left: ٥٠٪;
            transform: translate(-٥٠٪, -٥٠٪);
            z-index: ٠;
        }

        .heart-btn:hover {
            transform: scale(1.1);
            box-shadow: ٠ ١٥px ٣٥px rgba(255, 105, 180, 0.6);
        }

        .heart-btn:active {
            transform: scale(0.95);
            animation: pulse-btn ٠٫٤s;
        }

        @keyframes pulse-btn {
            ٠٪ { transform: scale(1); }
            ٥٠٪ { transform: scale(1.15); }
            ١٠٠٪ { transform: scale(1); }
        }

        .quote-container {
            margin: ٢٥px ٠;
            padding: ٢٠px;
            background: rgba(255, 182, 193, 0.15);
            border-radius: ١٥px;
            min-height: ٨٠px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: ١٨px;
            color: #c2185b;
            line-height: ١٫٦;
            border: ١px dashed #ffb6c1;
        }

        .note {
            font-size: ١٧px;
            color: #٧٧٧;
            margin-top: ١٥px;
            line-height: ١٫٥;
        }

        @media (max-width: ٦٠٠px) {
            h1 { font-size: ٢٨px; }
            p { font-size: ١٨px; }
            .heart { font-size: ٣٥px; }
            .pdf-container { height: ٦٠vh; min-height: ٣٥٠px; }
            .quote-container { font-size: ١٦px; padding: ١٥px; }
            .heart-btn { width: ١٢٠px; height: ١٢٠px; font-size: ١٨px; }
            .heart-btn::before { font-size: ٥٠px; }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>
            <span class="heart">❤️</span>
            إلى زوجتي الغالية مجد
            <span class="heart">❤️</span>
        </h1>

        <p>
            أهديك يا مجد كتاب لغات الحب الخمس  
            لأني رأيت فيه كثيرا من لغات الحب التي بيننا  
            تفضلي اقرئيه هنا مباشرة  
            ودعي قلبك يستمع إلى ما يشبه حبنا
        </p>

        <div class="pdf-container">
            <iframe src="lovebook.pdf"></iframe>
        </div>

        <button class="heart-btn" onclick="showQuote()">
            كلمة من قلبي لك
        </button>

        <div class="quote-container" id="quote">
            اضغطي القلب لتري كلمة تهمس لك
        </div>

        <button class="heart-btn" onclick="window.location='lovebook.pdf';">
            افتحي الكتاب 💝
        </button>

        <div class="note">
            او اضغطي على القلب الثاني لتحميل الكتاب مباشرة
        </div>
    </div>

    <script>
        const quotes = [
            "الحب ليس أن تنظر بعضكما إلى بعض بل أن تنظرا معا في اتجاه واحد",
            "أنت في قلبي كالروح في الجسد لا تستقر إلا بك",
            "الزواج نصف الدين فاجعله نصف الجنة بحسن المعاشرة",
            "من رزقه الله زوجة صالحة فقد أعانه على نصف دينه فليتق الله في النصف الآخر",
            "أجمل ما في الحب أن يصبح الاثنان واحدا دون أن يفقد أحدهما نفسه",
            "إذا أردت أن تعرف مقدار حبي لك فانظر إلى مقدار سعادتي حين أراك",
            "الحب الحقيقي هو الذي ينمو مع الزمن ويزداد جمالا بالصبر والتفاهم",
            "أنت لست مجرد زوجتي أنت بيتي وأماني وسكينتي",
            "ربنا هب لنا من أزواجنا وذرياتنا قرة أعين واجعلنا للمتقين إماما",
            "كل يوم معك هو صفحة جديدة من قصة حب لا تنتهي"
        ];

        function showQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").innerText = quotes[randomIndex];
        }
    </script>

</body>
</html>
