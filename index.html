<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign AI</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#f8fafc;
  margin:0;
  padding:14px;
}
h1{color:#38bdf8;text-align:center;}
textarea,input{
  width:100%;
  border-radius:8px;
  border:none;
  padding:10px;
  margin-top:6px;
  font-size:15px;
}
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  color:#020617;
}
ul{list-style:none;padding:0;margin-top:12px;}
li{
  background:#1e293b;
  margin-bottom:8px;
  padding:10px;
  border-radius:6px;
}
.settings{
  margin-top:20px;
  background:#020617;
  padding:12px;
  border-radius:10px;
}
.footer{
  text-align:center;
  margin-top:18px;
  color:#94a3b8;
  font-size:12px;
}
</style>
</head>

<body>

<h1>🧠 Sovereign AI</h1>

<textarea id="input" placeholder="اكتب أو تحدث باسمك"></textarea>
<button onclick="run()">تنفيذ</button>
<button onclick="startListening()">🎙️ تحدث الآن</button>

<ul id="output"></ul>

<div class="settings">
<h3>⚙️ الإعدادات</h3>

<label><input type="checkbox" id="enableVoice" checked> تفعيل الصوت</label><br>
<label><input type="checkbox" id="silentMode"> 🔕 صامت بالكامل</label><br>
<label><input type="checkbox" id="smartDnd"> 🧠 عدم إزعاج ذكي</label><br>
<label><input type="checkbox" id="autoSpeak" checked> التحدث تلقائياً</label><br>
<label><input type="checkbox" id="notificationsEnabled"> 🔔 إشعارات</label><br>

<label>سرعة الصوت
<input type="range" id="speechRate" min="0.7" max="1.2" step="0.05" value="0.95"></label>

<label>طبقة الصوت
<input type="range" id="speechPitch" min="0.8" max="1.2" step="0.05" value="1.0"></label>

<label>كلمة التأكيد
<input type="text" id="wakeWord" value="يا مساعد"></label>

<hr>

<h4>🎯 هدف اليوم</h4>
<input type="text" id="dailyGoal" placeholder="اكتب هدفك اليومي هنا">
<button onclick="saveGoal()">حفظ هدف اليوم</button>

</div>

<div class="footer">
قرار واحد • تنفيذ • إغلاق
</div>

<script>
let lastSpeakTime = 0;

function detectIntent(t){
  if(t.includes("حل")) return "SOLVE";
  if(t.includes("خط")) return "PLAN";
  return "EXECUTE";
}

function decide(text){
  const goal = dailyGoal.value || "";
  const i = detectIntent(text);
  if(i==="PLAN") return [
    "ضع هدف اليوم في الاعتبار: "+goal,
    "اختر خطوة واحدة فقط",
    "ابدأ التنفيذ فوراً",
    "أغلق"
  ];
  if(i==="SOLVE") return [
    "حدد المشكلة",
    "سبب واحد فقط",
    "إجراء مباشر",
    "أغلق"
  ];
  return ["نفّذ الآن لتحقيق هدفك","أغلق"];
}

function smartDndActive(){
  if(!smartDnd.checked) return false;
  const h=new Date().getHours();
  if(h>=22||h<=7) return true;
  if(Date.now()-lastSpeakTime<5000) return true;
  return false;
}

function speak(text){
  if(silentMode.checked) return;
  if(smartDndActive()) return;
  if(!enableVoice.checked) return;

  lastSpeakTime=Date.now();
  let u=new SpeechSynthesisUtterance(text);
  u.lang="ar";
  u.rate=parseFloat(speechRate.value);
  u.pitch=parseFloat(speechPitch.value);
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function notify(title,body){
  if(!notificationsEnabled.checked) return;
  if(silentMode.checked) return;
  const opt=smartDnd.checked?{body,silent:true}:{body};
  if(Notification.permission==="granted") new Notification(title,opt);
}

function run(textOverride){
  const text=textOverride || input.value.trim();
  if(!text) return;
  const steps=decide(text);
  output.innerHTML="";
  steps.forEach(s=>{
    let li=document.createElement("li");
    li.textContent=s;
    output.appendChild(li);
  });
  if(autoSpeak.checked) speak(steps.join(". "));
}

function startListening(){
  if(silentMode.checked) return;
  const r=new webkitSpeechRecognition();
  r.lang="ar";
  r.onresult=e=>{
    const t=e.results[0][0].transcript;
    if(t.startsWith(wakeWord.value)){
      run(t.replace(wakeWord.value,"").trim());
    }
  };
  r.start();
}

function saveGoal(){
  localStorage.setItem("goal",dailyGoal.value);
  notify("الهدف اليومي","تم حفظ هدف اليوم");
}

function saveSettings(){
  localStorage.setItem("settings",JSON.stringify({
    v:enableVoice.checked,
    s:silentMode.checked,
    d:smartDnd.checked,
    a:autoSpeak.checked,
    n:notificationsEnabled.checked,
    r:speechRate.value,
    p:speechPitch.value,
    w:wakeWord.value
  }));
}

function loadSettings(){
  let s=JSON.parse(localStorage.getItem("settings"));
  if(!s) return;
  enableVoice.checked=s.v;
  silentMode.checked=s.s;
  smartDnd.checked=s.d;
  autoSpeak.checked=s.a;
  notificationsEnabled.checked=s.n;
  speechRate.value=s.r;
  speechPitch.value=s.p;
  wakeWord.value=s.w;
  dailyGoal.value=localStorage.getItem("goal")||"";
}

document.querySelectorAll("input").forEach(e=>{
  e.onchange=saveSettings;
});
window.onload=()=>{
  loadSettings();
  if(Notification&&Notification.permission!=="granted")
    Notification.requestPermission();
};
</script>

</body>
</html>
